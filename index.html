# Sistema E-commerce HTML + Firebase (Modelo Seguro)

```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}
header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}
.btn{
background:#007bff;
color:white;
}
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}
.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}
input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
}
.section{
display:none;
padding:20px;
}
.active{
display:block;
}
</style>
</head>
<body>

<header>
<h2>MINHA LOJA</h2>
<div>
<button onclick="showSection('catalogo')">Catálogo</button>
<button onclick="showSection('carrinho')">Carrinho (<span id="cartCount">0</span>)</button>
<button onclick="showSection('login')" id="btnLogin">Login</button>
<button onclick="showSection('admin')" id="btnAdmin" style="display:none;">Admin</button>
<button onclick="logout()" id="btnLogout" style="display:none;">Sair</button>
</div>
</header>

<section id="catalogo" class="section active">
<h2>Produtos</h2>
<div id="produtos" class="grid"></div>
</section>

<section id="carrinho" class="section">
<h2>Carrinho</h2>
<div id="listaCarrinho"></div>
<h3>Total: R$ <span id="totalCarrinho">0.00</span></h3>
</section>

<section id="login" class="section">
<div class="card">
<h2>Cliente</h2>
<input type="text" id="cpfLogin" placeholder="CPF">
<button class="btn" onclick="loginCliente()">Entrar</button>
</div>

<div class="card">
<h2>Cadastro</h2>
<input type="text" id="nomeCadastro" placeholder="Nome">
<input type="text" id="cpfCadastro" placeholder="CPF">
<select id="regiaoCadastro">
<option value="Sudeste">Sudeste</option>
<option value="Sul">Sul</option>
<option value="Nordeste">Nordeste</option>
<option value="Norte">Norte</option>
</select>
<button class="btn" onclick="cadastrarCliente()">Cadastrar</button>
</div>

<div class="card">
<h2>Admin</h2>
<input type="text" id="adminUser" placeholder="Usuário">
<input type="password" id="adminPass" placeholder="Senha">
<button class="btn" onclick="fazerLoginAdmin()">Entrar Admin</button>
</div>
</section>

<section id="admin" class="section">
<h2>Painel Admin</h2>

<div class="card">
<h3>Novo Produto</h3>
<input type="text" id="novoNome" placeholder="Nome produto">
<input type="number" id="novoPreco" placeholder="Preço">
<input type="text" id="novoMarca" placeholder="Marca">
<input type="text" id="novoImg" placeholder="URL imagem">
<button class="btn" onclick="addProduto()">Adicionar</button>
</div>

<div id="adminProdutos"></div>

<h2>Clientes</h2>
<div id="clientes"></div>
</section>

<script>
const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let produtos = [];
let carrinho = [];
let clientes = [];
let clienteLogado = null;
let adminLogado = false;

function showSection(id){
document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

async function carregarProdutos(){
const snap = await db.collection('produtos').get();
produtos = snap.docs.map(doc=>doc.data());
renderProdutos();
renderAdminProdutos();
}

function renderProdutos(){
const div = document.getElementById('produtos');

div.innerHTML = produtos.map(p=>`
<div class="card product">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>${p.marca}</p>
<h2>R$ ${Number(p.preco).toFixed(2)}</h2>
<button class="btn" onclick="addCarrinho(${p.id})">Adicionar</button>
</div>
`).join('');
}

function addCarrinho(id){
const prod = produtos.find(p=>p.id===id);
carrinho.push(prod);
renderCarrinho();
}

function renderCarrinho(){
const div = document.getElementById('listaCarrinho');
let total = 0;

div.innerHTML = carrinho.map((p,i)=>{
total += Number(p.preco);
return `
<div class="card">
${p.nome} - R$ ${p.preco}
<button onclick="removerCarrinho(${i})">Remover</button>
</div>
`;
}).join('');

document.getElementById('totalCarrinho').innerText = total.toFixed(2);
document.getElementById('cartCount').innerText = carrinho.length;
}

function removerCarrinho(i){
carrinho.splice(i,1);
renderCarrinho();
}

async function cadastrarCliente(){
const cliente = {
nome: document.getElementById('nomeCadastro').value,
cpf: document.getElementById('cpfCadastro').value,
regiao: document.getElementById('regiaoCadastro').value
};

await db.collection('clientes').doc(cliente.cpf).set(cliente);
alert('Cliente cadastrado');
}

async function loginCliente(){
const cpf = document.getElementById('cpfLogin').value;
const doc = await db.collection('clientes').doc(cpf).get();

if(doc.exists){
clienteLogado = doc.data();
alert('Login realizado');
showSection('catalogo');
}else{
alert('CPF não encontrado');
}
}

function fazerLoginAdmin(){
const usuario = document.getElementById('adminUser').value;
const senha = document.getElementById('adminPass').value;

if(usuario === 'admin' && senha === '123456'){
adminLogado = true;

alert('Admin logado');

document.getElementById('btnAdmin').style.display = 'inline-block';
document.getElementById('btnLogout').style.display = 'inline-block';
document.getElementById('btnLogin').style.display = 'none';

showSection('admin');

carregarClientes();
}else{
alert('Dados inválidos');
}
}

async function addProduto(){
const produto = {
id: Date.now(),
nome: document.getElementById('novoNome').value,
preco: parseFloat(document.getElementById('novoPreco').value),
marca: document.getElementById('novoMarca').value,
img: document.getElementById('novoImg').value
};

await db.collection('produtos').doc(String(produto.id)).set(produto);

alert('Produto adicionado');

carregarProdutos();
}

function renderAdminProdutos(){
const div = document.getElementById('adminProdutos');

if(!div) return;

div.innerHTML = produtos.map(p=>`
<div class="card">
<input type="text" id="nome-${p.id}" value="${p.nome}">
<input type="number" id="preco-${p.id}" value="${p.preco}">
<input type="text" id="marca-${p.id}" value="${p.marca}">
<input type="text" id="img-${p.id}" value="${p.img}">

<button class="btn" onclick="salvarProduto(${p.id})">Salvar</button>
<button onclick="excluirProduto(${p.id})">Excluir</button>
</div>
`).join('');
}

async function salvarProduto(id){
const produto = {
id,
nome: document.getElementById(`nome-${id}`).value,
preco: parseFloat(document.getElementById(`preco-${id}`).value),
marca: document.getElementById(`marca-${id}`).value,
img: document.getElementById(`img-${id}`).value
};

await db.collection('produtos').doc(String(id)).set(produto);
alert('Produto atualizado');
carregarProdutos();
}

async function excluirProduto(id){
await db.collection('produtos').doc(String(id)).delete();
alert('Produto removido');
carregarProdutos();
}

async function carregarClientes(){
const snap = await db.collection('clientes').get();
clientes = snap.docs.map(doc=>doc.data());

const div = document.getElementById('clientes');

div.innerHTML = clientes.map(c=>`
<div class="card">
${c.nome}<br>
CPF: ${c.cpf}<br>
${c.regiao}
</div>
`).join('');
}

function logout(){
location.reload();
}

carregarProdutos();
</script>

</body>
</html>
```
