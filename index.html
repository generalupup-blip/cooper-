<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOPER PHARMA DAVID OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #ffffff; --surface: #f8f9fa; --surface2: #e9ecef; --border: #ced4da;
            --text: #212529; --text2: #495057; --accent: #0d6efd; --accent2: #0b5ed7;
            --danger: #dc3545; --success: #198754; --info: #0dcaf0; --warning: #ffc107;
            --radius: 10px; --shadow: 0 8px 30px rgba(0,0,0,0.1); --transition: 0.25s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        
        header { background: #000; color:#fff; padding:1.5rem; text-align:center; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
        nav { background:var(--surface); padding:1rem; display:flex; justify-content:center; gap:15px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
        
        button { padding:10px 20px; border:none; border-radius:var(--radius); cursor:pointer; transition:var(--transition); font-weight:600; background:var(--surface2); color:var(--text); }
        button:hover { opacity:0.8; transform:translateY(-2px); }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        .btn-success { background:var(--success); color:#fff; }

        .container { max-width:1200px; margin:2rem auto; padding:0 1rem; }
        .section { display:none; animation: fadeIn 0.3s ease; }
        .active { display:block; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* Catalogo */
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:25px; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; text-align:center; transition:var(--transition); position:relative; overflow:hidden; }
        .card:hover { transform:translateY(-10px); box-shadow:var(--shadow); }
        .card img { width:100%; height:200px; object-fit:contain; margin-bottom:1rem; border-radius:8px; background:#fff; }
        .card h3 { font-size:1.1rem; margin-bottom:0.5rem; }
        .card .price { font-size:1.4rem; color:var(--accent); font-weight:bold; margin:1rem 0; }

        /* Tabelas */
        table { width:100%; border-collapse:collapse; margin-top:1rem; background:#fff; border-radius:var(--radius); overflow:hidden; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid var(--border); }
        th { background:var(--surface2); }

        /* Forms */
        .form-group { margin-bottom:1.5rem; display:flex; flex-direction:column; gap:8px; }
        input, select { padding:12px; border:1px solid var(--border); border-radius:var(--radius); width:100%; }

        .badge { padding:4px 8px; border-radius:5px; font-size:0.8rem; font-weight:bold; }
        .badge-pendente { background:var(--warning); color:#000; }
        .badge-concluido { background:var(--success); color:#fff; }
    </style>
</head>
<body>

    <header>
        <h1>COOPER PHARMA DAVID OFICIAL</h1>
    </header>

    <nav id="main-nav">
        <button onclick="showSection('catalogo')">🛒 Catálogo</button>
        <button onclick="showSection('carrinho')" id="btn-carrinho">🛍️ Carrinho (0)</button>
        <button onclick="showSection('login')" id="nav-login">👤 Login / Cadastro</button>
        <button onclick="logout()" id="nav-logout" style="display:none">🚪 Sair</button>
        <button onclick="showSection('admin')" id="nav-admin" class="btn-primary" style="display:none">📊 Pedidos Admin</button>
        <button onclick="showSection('gerenciar')" id="nav-gerenciar" class="btn-primary" style="display:none">⚙️ Gerenciar Produtos</button>
        <button onclick="showSection('clientes')" id="nav-clientes" class="btn-primary" style="display:none">👥 Clientes</button>
    </nav>

    <div class="container">
        <section id="catalogo" class="section active">
            <div id="filtros-marcas" style="margin-bottom:2rem; display:flex; gap:10px; flex-wrap:wrap;"></div>
            <div id="lista-produtos" class="grid"></div>
        </section>

        <section id="carrinho" class="section">
            <h2>Seu Carrinho</h2>
            <div id="itens-carrinho"></div>
            <div style="margin-top:2rem; text-align:right;">
                <h3 id="total-carrinho">Total: R$ 0,00</h3>
                <br>
                <button class="btn-success" onclick="finalizarPedido()">✅ Finalizar Compra</button>
            </div>
        </section>

        <section id="login" class="section">
            <div style="max-width:400px; margin:auto;">
                <div id="login-box">
                    <h2>Entrar</h2>
                    <div class="form-group">
                        <input type="text" id="loginUser" placeholder="Usuário">
                        <input type="password" id="loginPass" placeholder="Senha">
                        <button class="btn-primary" onclick="realizarLogin()">Entrar</button>
                    </div>
                    <p>Não tem conta? <a href="#" onclick="toggleAuth(true)">Cadastre-se</a></p>
                </div>
                <div id="cadastro-box" style="display:none">
                    <h2>Cadastro</h2>
                    <div class="form-group">
                        <input type="text" id="cadUser" placeholder="Usuário">
                        <input type="password" id="cadPass" placeholder="Senha">
                        <button class="btn-success" onclick="realizarCadastro()">Cadastrar</button>
                    </div>
                    <p>Já tem conta? <a href="#" onclick="toggleAuth(false)">Fazer Login</a></p>
                </div>
            </div>
        </section>

        <section id="admin" class="section">
            <h2>Painel de Pedidos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Produtos</th>
                        <th>Total</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-pedidos"></tbody>
            </table>
        </section>

        <section id="gerenciar" class="section">
            <h2>Gerenciar Inventário</h2>
            <div style="background:var(--surface2); padding:1rem; border-radius:10px; margin-bottom:2rem;">
                <h3>Adicionar Novo Produto</h3>
                <div class="grid" style="grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:10px; margin-top:10px;">
                    <input type="text" id="newProdNome" placeholder="Nome">
                    <input type="number" id="newProdPreco" placeholder="Preço">
                    <input type="text" id="newProdMarca" placeholder="Marca">
                    <input type="file" id="newProdImg" accept="image/*">
                    <button class="btn-success" onclick="adicionarNovoProduto()">Salvar Produto</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos-admin"></tbody>
            </table>
        </section>

        <section id="clientes" class="section">
            <h2>Clientes Cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Senha</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes"></tbody>
            </table>
        </section>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- DADOS E ESTADO ---
        let produtos = [];
        let clientes = [];
        let pedidos = [];
        let carrinho = [];
        let clienteLogado = null;
        let adminLogado = false;

        // Produtos que aparecem se o banco estiver vazio
        const produtosBase = [
            { nome: "Whey Protein", preco: 150.00, marca: "Max", img: "https://placehold.co/150x150?text=Whey" },
            { nome: "Creatina 300g", preco: 90.00, marca: "Growth", img: "https://placehold.co/150x150?text=Creatina" }
        ];

        // --- FUNÇÕES DE CARREGAMENTO ---
        async function carregarDados() {
            try {
                // Produtos
                const snapProd = await db.collection('produtos').get();
                if (snapProd.empty) {
                    for (let p of produtosBase) { await db.collection('produtos').add(p); }
                    produtos = [...produtosBase];
                } else {
                    produtos = snapProd.docs.map(doc => ({ idDoc: doc.id, ...doc.data() }));
                }

                // Clientes
                const snapCli = await db.collection('clientes').get();
                clientes = snapCli.docs.map(doc => ({ idDoc: doc.id, ...doc.data() }));

                // Pedidos
                const snapPed = await db.collection('pedidos').orderBy('data', 'desc').get();
                pedidos = snapPed.docs.map(doc => ({ idDoc: doc.id, ...doc.data() }));

                renderCatalogo();
                renderAdmin();
                renderGerenciar();
                renderClientes();
            } catch (e) { console.error("Erro carregando dados:", e); }
        }

        // --- NAVEGAÇÃO ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleAuth(isCadastro) {
            document.getElementById('login-box').style.display = isCadastro ? 'none' : 'block';
            document.getElementById('cadastro-box').style.display = isCadastro ? 'block' : 'none';
        }

        // --- LÓGICA DE USUÁRIO ---
        async function realizarCadastro() {
            const user = document.getElementById('cadUser').value;
            const pass = document.getElementById('cadPass').value;
            if(!user || !pass) return alert("Preencha tudo!");
            
            await db.collection('clientes').add({ user, pass });
            alert("Cadastro realizado! Faça login.");
            toggleAuth(false);
            carregarDados();
        }

        function realizarLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            if(user === 'admin' && pass === '123') {
                adminLogado = true;
                sessionStorage.setItem('adminLogado', 'true');
                alert("Olá, Administrador!");
                atualizarUI();
                showSection('admin');
                return;
            }

            const cli = clientes.find(c => c.user === user && c.pass === pass);
            if(cli) {
                clienteLogado = cli;
                sessionStorage.setItem('clienteLogado', JSON.stringify(cli));
                alert("Bem-vindo, " + user + "!");
                atualizarUI();
                showSection('catalogo');
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }

        function logout() {
            clienteLogado = null; adminLogado = false;
            sessionStorage.clear();
            location.reload();
        }

        function atualizarUI() {
            if(clienteLogado || adminLogado) {
                document.getElementById('nav-login').style.display = 'none';
                document.getElementById('nav-logout').style.display = 'inline-block';
            }
            if(adminLogado) {
                document.getElementById('nav-admin').style.display = 'inline-block';
                document.getElementById('nav-gerenciar').style.display = 'inline-block';
                document.getElementById('nav-clientes').style.display = 'inline-block';
            }
        }

        // --- LÓGICA DO CARRINHO ---
        function addCarrinho(index) {
            const p = produtos[index];
            carrinho.push(p);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            document.getElementById('btn-carrinho').innerText = `🛍️ Carrinho (${carrinho.length})`;
            renderCarrinho();
            alert("Adicionado!");
        }

        function renderCarrinho() {
            const div = document.getElementById('itens-carrinho');
            let html = '';
            let total = 0;
            carrinho.forEach((p, i) => {
                total += p.preco;
                html += `<div>${p.nome} - R$ ${p.preco.toFixed(2)} <button onclick="removerCarrinho(${i})">❌</button></div>`;
            });
            div.innerHTML = html || 'Carrinho vazio.';
            document.getElementById('total-carrinho').innerText = `Total: R$ ${total.toFixed(2)}`;
        }

        function removerCarrinho(i) {
            carrinho.splice(i, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            renderCarrinho();
        }

        // --- FINALIZAR PEDIDO (SALVA PARA O ADMIN) ---
        async function finalizarPedido() {
            if(!clienteLogado) {
                alert("Faça login para comprar!");
                showSection('login');
                return;
            }
            if(carrinho.length === 0) return alert("Carrinho vazio!");

            const total = carrinho.reduce((acc, p) => acc + p.preco, 0);
            const pedido = {
                usuario: clienteLogado.user,
                itens: carrinho.map(c => c.nome).join(', '),
                total: total,
                data: new Date().toLocaleString(),
                status: 'pendente'
            };

            try {
                await db.collection('pedidos').add(pedido);
                alert("✅ Pedido enviado com sucesso!");
                carrinho = [];
                localStorage.removeItem('carrinho');
                document.getElementById('btn-carrinho').innerText = `🛍️ Carrinho (0)`;
                showSection('catalogo');
                carregarDados();
            } catch(e) { alert("Erro ao salvar pedido."); }
        }

        // --- RENDERIZADORES ---
        function renderCatalogo() {
            const div = document.getElementById('lista-produtos');
            div.innerHTML = produtos.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" alt="${p.nome}">
                    <h3>${p.nome}</h3>
                    <p>${p.marca}</p>
                    <div class="price">R$ ${p.preco.toFixed(2)}</div>
                    <button class="btn-primary" onclick="addCarrinho(${i})">Comprar</button>
                </div>
            `).join('');
        }

        function renderAdmin() {
            const tbody = document.getElementById('tabela-pedidos');
            tbody.innerHTML = pedidos.map(p => `
                <tr>
                    <td>#${p.idDoc.substring(0,5)}</td>
                    <td>${p.usuario}</td>
                    <td>${p.itens}</td>
                    <td>R$ ${p.total.toFixed(2)}</td>
                    <td>${p.data}</td>
                    <td><span class="badge badge-${p.status}">${p.status}</span></td>
                </tr>
            `).join('');
        }

        function renderGerenciar() {
            const tbody = document.getElementById('tabela-produtos-admin');
            tbody.innerHTML = produtos.map(p => `
                <tr>
                    <td><img src="${p.img}" width="40"></td>
                    <td>${p.nome}</td>
                    <td>R$ ${p.preco.toFixed(2)}</td>
                    <td><button class="btn-danger" onclick="excluirProduto('${p.idDoc}')">Deletar</button></td>
                </tr>
            `).join('');
        }

        function renderClientes() {
            const tbody = document.getElementById('tabela-clientes');
            tbody.innerHTML = clientes.map(c => `<tr><td>${c.user}</td><td>${c.pass}</td></tr>`).join('');
        }

        // --- UPLOAD DE PRODUTOS ---
        async function adicionarNovoProduto() {
            const nome = document.getElementById('newProdNome').value;
            const preco = parseFloat(document.getElementById('newProdPreco').value);
            const marca = document.getElementById('newProdMarca').value;
            const file = document.getElementById('newProdImg').files[0];

            if(!nome || !preco) return alert("Preencha nome e preço!");

            let imgFinal = "https://placehold.co/150x150?text=Sem+Foto";

            if(file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    imgFinal = reader.result; // Base64 para persistência
                    await db.collection('produtos').add({ nome, preco, marca, img: imgFinal });
                    alert("Produto Adicionado!");
                    carregarDados();
                };
            } else {
                await db.collection('produtos').add({ nome, preco, marca, img: imgFinal });
                alert("Produto Adicionado!");
                carregarDados();
            }
        }

        async function excluirProduto(id) {
            if(confirm("Deseja excluir?")) {
                await db.collection('produtos').doc(id).delete();
                carregarDados();
            }
        }

        // --- INIT ---
        window.onload = () => {
            carregarDados();
            const logado = sessionStorage.getItem('clienteLogado');
            if(logado) clienteLogado = JSON.parse(logado);
            if(sessionStorage.getItem('adminLogado')) adminLogado = true;
            atualizarUI();
            
            const localCar = localStorage.getItem('carrinho');
            if(localCar) {
                carrinho = JSON.parse(localCar);
                document.getElementById('btn-carrinho').innerText = `🛍️ Carrinho (${carrinho.length})`;
                renderCarrinho();
            }
        };
    </script>
</body>
</html>
