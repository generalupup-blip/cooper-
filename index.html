<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOPER PHARMA DAVID OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #ffffff; --surface: #f8f9fa; --surface2: #e9ecef; --border: #ced4da;
            --text: #212529; --text2: #495057; --accent: #0d6efd; --accent2: #0b5ed7;
            --danger: #dc3545; --success: #198754; --info: #0dcaf0; --warning: #ffc107;
            --radius: 10px; --shadow: 0 8px 30px rgba(0,0,0,0.1); --transition: 0.25s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
        header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); box-shadow:0 2px 15px rgba(0,0,0,0.05); }
        .logo { font-size: 2rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; color: #FFD700; animation: blink 1.5s infinite; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        @keyframes blink { 0%{opacity:1} 50%{opacity:0.3} 100%{opacity:1} }
        nav { display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center; }
        nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:0.5rem 1.1rem; border-radius:20px; cursor:pointer; font-size:0.85rem; transition:var(--transition); font-weight:500; white-space:nowrap; }
        nav button:hover { background:var(--border); border-color:var(--accent); color:#0b5ed7; }
        .cart-badge { background:var(--accent); color:white; border-radius:50%; padding:0.15rem 0.45rem; font-size:0.7rem; font-weight:700; margin-left:4px; }
        main { max-width:1300px; margin:2rem auto; padding:0 1.5rem; }
        .section { display:none; animation:fadeIn 0.4s ease; }
        .section.active { display:block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        h2 { font-size:1.8rem; margin-bottom:1.5rem; color:var(--text); border-bottom:2px solid var(--border); padding-bottom:0.5rem; }
        h3 { color:var(--text); margin-bottom:1rem; font-size:1.2rem; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:1.5rem; }
        .product-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; text-align:center; transition:var(--transition); box-shadow:var(--shadow); display:flex; flex-direction:column; gap:0.6rem; color:var(--text); }
        .product-card:hover { transform:translateY(-5px); border-color:var(--accent); box-shadow:0 16px 40px rgba(13,110,253,0.1); }
        .product-card img { width:100%; height:120px; object-fit:contain; border-radius:8px; background:#f1f3f5; padding:0.5rem; }
        .product-card .name { font-weight:700; font-size:0.95rem; min-height:2.4rem; color:#212529; }
        .product-card .price { font-size:1.4rem; font-weight:800; color:var(--accent2); }
        .product-card .brand-tag { font-size:0.65rem; background:#fff3cd; padding:0.2rem 0.6rem; border-radius:12px; display:inline-block; color:#856404; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
        .qty-input { width:55px; padding:0.4rem; background:white; border:1px solid var(--border); color:var(--text); border-radius:6px; text-align:center; }
        .btn { background:var(--accent); color:white; border:none; padding:0.5rem 1.2rem; border-radius:20px; cursor:pointer; font-weight:700; font-size:0.85rem; transition:var(--transition); }
        .btn:hover { background:#0b5ed7; }
        .btn-danger { background:var(--danger); } .btn-danger:hover { background:#bb2d3b; }
        .btn-success { background:var(--success); } .btn-success:hover { background:#157347; }
        .btn-info { background:var(--info); color:#000; } .btn-info:hover { background:#0aa2c0; }
        .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); font-weight:600; }
        .btn-outline:hover { background:var(--accent); color:white; }
        .btn-sm { padding:0.3rem 0.8rem; font-size:0.75rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; margin-bottom:0.3rem; font-weight:600; color:var(--text2); font-size:0.8rem; }
        .form-group input, .form-group select { width:100%; padding:0.6rem 1rem; background:white; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:1rem; transition:var(--transition); }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,110,253,0.15); }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); color:var(--text); }
        .search-box { width:100%; padding:0.7rem 1.2rem; background:white; border:1px solid var(--border); border-radius:25px; color:var(--text); font-size:1rem; margin-bottom:1.5rem; transition:var(--transition); }
        .search-box:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(13,110,253,0.15); }
        .alert-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; color: #856404; font-size: 0.9rem; white-space: pre-line; }
        .hidden { display:none !important; }
        .flex-row { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
        .flex-between { justify-content:space-between; }
        .mb-2 { margin-bottom:1rem; }
        .file-input { padding:0.4rem; background:white; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; width:180px; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="showSection('catalogo')">COOPER PHARMA DAVID OFICIAL</div>
        <nav>
            <button onclick="showSection('catalogo')">🏪 Produtos</button>
            <button onclick="showSection('carrinho')">🛒 Carrinho <span class="cart-badge" id="cart-count">0</span></button>
            <button onclick="showSection('login')" id="nav-login">👤 Entrar / Cadastro</button>
            <button onclick="showSection('admin')" id="nav-admin" style="display:none;">📊 Dashboard</button>
            <button onclick="showSection('gerenciarProdutos')" id="nav-gerenciar" style="display:none;">📦 Catálogo</button>
            <button onclick="logout()" id="nav-logout" style="display:none;">🚪 Sair</button>
        </nav>
    </header>
    <main>
        <section id="catalogo" class="section active">
            <h2>🏪 Catálogo de Produtos</h2>
            <input type="text" class="search-box" placeholder="🔍 Buscar por nome..." id="searchInput" oninput="renderCatalogo()">
            <div id="catalogoContainer" class="product-grid"></div>
        </section>

        <section id="carrinho" class="section">
            <h2>🛒 Seu Carrinho</h2>
            <div id="carrinhoContainer"></div>
            <div id="carrinhoResumo" class="hidden">
                <div class="card">
                    <h3>Resumo do Pedido</h3>
                    <p><strong>Total de itens:</strong> <span id="resumoItens">0</span></p>
                    <p><strong>Valor Total:</strong> <span id="resumoTotal" style="font-size:1.5rem;color:var(--accent2);">R$ 0,00</span></p>
                    <button class="btn" onclick="finalizarPedido()" id="btnFinalizar" disabled>✅ Finalizar Compra</button>
                </div>
            </div>
        </section>

        <section id="login" class="section">
            <h2>👤 Acesso</h2>
            <div class="card" style="max-width:600px;margin:0 auto;">
                <div id="loginForm">
                    <h3>Entrar</h3>
                    <div class="form-group"><label>CPF</label><input type="text" id="loginCpf" placeholder="000.000.000-00"></div>
                    <button class="btn" onclick="loginCliente()">Entrar</button>
                </div>
            </div>
            <div class="card" style="max-width:500px;margin:1rem auto;background:var(--surface2);border-left:4px solid var(--accent);">
                <p style="font-size:0.85rem;color:var(--text2);">🔐 <strong>Admin?</strong></p>
                <button class="btn btn-outline" onclick="showAdminLogin()">Acessar Painel Admin</button>
            </div>
        </section>

        <section id="admin" class="section">
            <h2>📊 Painel Administrativo</h2>
            <div id="adminLoginForm" class="card" style="max-width:400px;margin:2rem auto; display:none;">
                <h3>Login Admin</h3>
                <div class="form-group"><label>Login</label><input type="text" id="adminUser"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="adminPass"></div>
                <button class="btn" onclick="loginAdmin()">Entrar</button>
            </div>
            <div id="adminContent">
                <div class="flex-row flex-between mb-2">
                    <h2>📋 Pedidos Recentes</h2>
                </div>
                <div id="adminPedidosContainer"></div>
            </div>
        </section>

        <section id="gerenciarProdutos" class="section">
            <h2>📦 Gerenciar Catálogo de Produtos</h2>
            <div class="card mb-2">
                <h3>➕ Adicionar Novo Produto</h3>
                <div class="flex-row" style="align-items:flex-end;">
                    <div class="form-group" style="flex:2;"><label>Nome</label><input type="text" id="novoProdNome" placeholder="Nome do produto"></div>
                    <div class="form-group" style="flex:1;"><label>Preço (R$)</label><input type="number" id="novoProdPreco" placeholder="0.00" step="0.01"></div>
                    <div class="form-group" style="flex:2;"><label>Marca</label><input type="text" id="novoProdMarca" placeholder="Marca"></div>
                    <button class="btn btn-success" onclick="adicionarNovoProduto()" style="margin-bottom:1rem;">➕ Adicionar</button>
                </div>
            </div>
            <div id="gerenciarContainer"></div>
        </section>
    </main>

    <script>
        // === CONFIGURAÇÃO DO FIREBASE (COM SEUS DADOS ATUALIZADOS) ===
        const firebaseConfig = {
            apiKey: "AIzaSyA3opO53eiig8sJkVIHMFuYy5TZxOSFEbY",
            authDomain: "cooper-2c714.firebaseapp.com",
            databaseURL: "https://cooper-2c714-default-rtdb.firebaseio.com",
            projectId: "cooper-2c714",
            storageBucket: "cooper-2c714.firebasestorage.app",
            messagingSenderId: "791406083313",
            appId: "1:791406083313:web:f6772963085b6625abbd50"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // === COLE SUA LISTA DE 367 PRODUTOS AQUI DENTRO ===
        const produtosBase = [
            {id:1,nome:'GHK-Cu 100mg/3ml',preco:800,marca:'NEOPEPTIDES',img:'https://placehold.co/150x150/1a1a2e/d4af37?text=GHK-Cu'},
            {id:2,nome:'SLU-PP-332 5mg/3ml',preco:600,marca:'NEOPEPTIDES',img:'https://placehold.co/150x150/1a1a2e/d4af37?text=SLU-PP'},
            {id:3,nome:'Tesamorelin 10mg/3ml',preco:750,marca:'NEOPEPTIDES',img:'https://placehold.co/150x150/1a1a2e/d4af37?text=Tesa'}
            // ... COPIE E COLE O RESTANTE DA SUA LISTA AQUI ...
        ];

        let produtos = [];
        let carrinho = [], pedidos = [], adminLogado = false, clienteLogado = null;

        // --- SISTEMA PRINCIPAL ---
        async function carregarDados() {
            try {
                // Tenta puxar produtos do Firebase
                const prodSnap = await db.collection('produtos').get();
                if (prodSnap.empty) {
                    console.log("Banco de dados vazio. Carregando produtos originais...");
                    produtos = [...produtosBase];
                    // Salva os produtos bases no firebase para não sumirem
                    for(let p of produtos) { await db.collection('produtos').doc(String(p.id)).set(p); }
                } else {
                    produtos = prodSnap.docs.map(d => d.data());
                }

                // Carrega Pedidos se for admin
                if(adminLogado) {
                    const pSnap = await db.collection('pedidos').get();
                    pedidos = pSnap.docs.map(d => ({idDoc: d.id, ...d.data()}));
                    renderAdminPedidos();
                }

                renderCatalogo();
            } catch(e) { console.error("Erro ao carregar banco de dados: ", e); }
        }

        // --- NAVEGAÇÃO ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'gerenciarProdutos') renderGerenciarProdutos();
        }

        // --- CATÁLOGO ---
        function renderCatalogo() {
            const container = document.getElementById('catalogoContainer');
            const termo = document.getElementById('searchInput').value.toLowerCase();
            
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            
            container.innerHTML = filtrados.map((p, index) => `
                <div class="product-card">
                    <img src="${p.img || 'https://placehold.co/150x150?text=Sem+Foto'}">
                    <span class="brand-tag">${p.marca}</span>
                    <span class="name">${p.nome}</span>
                    <span class="price">R$ ${Number(p.preco).toFixed(2)}</span>
                    <button class="btn" onclick="addCarrinho(${index})">🛒 Adicionar</button>
                </div>
            `).join('');
        }

        // --- CARRINHO ---
        function addCarrinho(index) {
            carrinho.push(produtos[index]);
            document.getElementById('cart-count').innerText = carrinho.length;
            alert("Produto adicionado!");
            renderCarrinho();
        }

        function renderCarrinho() {
            const container = document.getElementById('carrinhoContainer');
            const resumo = document.getElementById('carrinhoResumo');
            if(carrinho.length === 0) {
                container.innerHTML = "<p>Seu carrinho está vazio.</p>";
                resumo.classList.add('hidden');
                return;
            }

            resumo.classList.remove('hidden');
            let total = 0;
            container.innerHTML = carrinho.map((p, i) => {
                total += Number(p.preco);
                return `<div style="border-bottom:1px solid #ccc; padding:10px 0;">${p.nome} - R$ ${Number(p.preco).toFixed(2)} <button onclick="removerCarrinho(${i})" style="color:red; background:none; border:none; cursor:pointer;">Remover</button></div>`;
            }).join('');
            
            document.getElementById('resumoTotal').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('btnFinalizar').disabled = false;
        }

        function removerCarrinho(i) {
            carrinho.splice(i, 1);
            document.getElementById('cart-count').innerText = carrinho.length;
            renderCarrinho();
        }

        // --- FINALIZAR COMPRA (VAI PRO ADMIN) ---
        async function finalizarPedido() {
            const total = carrinho.reduce((acc, p) => acc + Number(p.preco), 0);
            const pedidoId = Date.now().toString();

            const novoPedido = {
                id: pedidoId,
                data: new Date().toLocaleString(),
                itens: carrinho.map(c => c.nome).join(', '),
                total: total,
                status: 'Pendente'
            };

            try {
                await db.collection('pedidos').add(novoPedido);
                alert("✅ Compra finalizada com sucesso! O Admin já pode ver o seu pedido.");
                carrinho = [];
                document.getElementById('cart-count').innerText = "0";
                showSection('catalogo');
                renderCarrinho();
            } catch (error) { alert("Erro ao salvar pedido: " + error.message); }
        }

        // --- PAINEL ADMIN E PRODUTOS ---
        function showAdminLogin() {
            document.getElementById('adminLoginForm').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
            showSection('admin');
        }

        function loginAdmin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user === 'BOMBADAVID' && pass === '20362881') {
                adminLogado = true;
                document.getElementById('adminLoginForm').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('nav-admin').style.display = 'inline-block';
                document.getElementById('nav-gerenciar').style.display = 'inline-block';
                document.getElementById('nav-logout').style.display = 'inline-block';
                document.getElementById('nav-login').style.display = 'none';
                carregarDados();
                alert("Bem-vindo, Admin!");
            } else {
                alert("Credenciais incorretas!");
            }
        }

        function renderAdminPedidos() {
            const container = document.getElementById('adminPedidosContainer');
            container.innerHTML = pedidos.map(p => `
                <div class="card" style="margin-bottom:10px;">
                    <p><strong>Pedido:</strong> ${p.id}</p>
                    <p><strong>Data:</strong> ${p.data}</p>
                    <p><strong>Itens:</strong> ${p.itens}</p>
                    <p><strong>Total:</strong> R$ ${p.total.toFixed(2)}</p>
                    <span style="background:yellow; padding:3px 8px; border-radius:5px;">${p.status}</span>
                </div>
            `).join('');
        }

        async function adicionarNovoProduto() {
            const nome = document.getElementById('novoProdNome').value;
            const preco = parseFloat(document.getElementById('novoProdPreco').value);
            const marca = document.getElementById('novoProdMarca').value;
            const id = Date.now();

            if(!nome || !preco) return alert("Preencha nome e preço!");

            const novoProd = { id, nome, preco, marca, img: 'https://placehold.co/150x150?text=Sem+Foto' };
            
            try {
                await db.collection('produtos').doc(String(id)).set(novoProd);
                alert("Produto adicionado e salvo no banco!");
                document.getElementById('novoProdNome').value = '';
                document.getElementById('novoProdPreco').value = '';
                document.getElementById('novoProdMarca').value = '';
                carregarDados();
            } catch(e) { alert("Erro ao salvar produto: " + e.message); }
        }

        function renderGerenciarProdutos() {
            const container = document.getElementById('gerenciarContainer');
            container.innerHTML = produtos.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                    <span style="font-weight:bold;">${p.nome}</span>
                    <span>R$ ${Number(p.preco).toFixed(2)}</span>
                    <input type="file" id="upload_${p.id}" class="file-input" onchange="uploadImagemProduto('${p.id}', this)">
                </div>
            `).join('');
        }

        function uploadImagemProduto(produtoId, fileInput) {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64 = e.target.result;
                const produto = produtos.find(p => p.id == produtoId);
                if (produto) {
                    produto.img = base64;
                    await db.collection('produtos').doc(String(produtoId)).set(produto, {merge:true});
                    alert('✅ Imagem salva no banco com sucesso!');
                    carregarDados();
                }
            };
            reader.readAsDataURL(file);
        }

        function logout() { location.reload(); }

        // Inicia o App
        window.onload = () => { carregarDados(); };
    </script>
</body>
</html>
